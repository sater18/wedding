<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Свадьба Василия и Анастасии</title>
    
    <!-- Свадебные шрифты -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #fcfbfa;
            --text-main: #333333;
            --text-secondary: #767676;
            --accent-color: #9ca998; 
            --font-title: 'Cormorant Garamond', serif;
            --font-body: 'Montserrat', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-body);
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Анимация плавного появления блоков при прокрутке */
        .fade-in-section {
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 1.2s ease-out, transform 1.2s ease-out;
            will-change: opacity, transform;
        }

        .fade-in-section.is-visible {
            opacity: 1;
            transform: translateY(0);
        }

        section {
            padding: 100px 20px;
            text-align: center;
            max-width: 800px;
            margin: 0 auto;
        }

        h2 {
            font-family: var(--font-title);
            font-size: 3rem;
            font-weight: 400;
            margin-bottom: 25px;
            color: var(--text-main);
        }

        h2::after {
            content: "";
            display: block;
            width: 40px;
            height: 1px;
            background-color: var(--accent-color);
            margin: 15px auto 0 auto;
        }

        p {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 20px;
        }

        /* Главный экран с анимацией фона */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            text-align: center;
            padding: 20px;
        }

        .hero-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(255, 255, 255, 0.35), rgba(255, 255, 255, 0.5)), 
                        url('https://unsplash.com') no-repeat center center/cover;
            z-index: -1;
            animation: zoomBg 20s infinite alternate ease-in-out;
        }

        @keyframes zoomBg {
            0% { transform: scale(1); }
            100% { transform: scale(1.08); }
        }

        .hero-content {
            animation: fadeInHero 1.5s ease-out;
        }

        @keyframes fadeInHero {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .hero h1 {
            font-family: var(--font-title);
            font-size: 5rem;
            margin-bottom: 15px;
            font-style: italic;
            font-weight: 400;
            color: #222222;
            text-shadow: 0 2px 10px rgba(255,255,255,0.4);
        }

        .hero .subtitle {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 35px;
            color: var(--text-secondary);
        }

        .hero .date {
            font-family: var(--font-title);
            font-size: 2.4rem;
            border-top: 1px solid var(--accent-color);
            border-bottom: 1px solid var(--accent-color);
            padding: 12px 50px;
            margin-bottom: 50px;
            color: #222222;
            display: inline-block;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(4px);
        }

        /* Стильный живой таймер */
        .timer-container {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .timer-card {
            background: rgba(255, 255, 255, 0.88);
            padding: 20px;
            border-radius: 12px;
            min-width: 95px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.7);
            transition: transform 0.3s;
        }
        .timer-card:hover { transform: translateY(-5px); }

        .timer-val {
            font-size: 2.4rem;
            font-family: var(--font-title);
            color: var(--text-main);
            font-weight: 400;
        }

        .timer-lbl {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-top: 5px;
        }

        /* Программа дня */
        .timeline {
            max-width: 550px;
            margin: 50px auto 0 auto;
            text-align: left;
        }

        .timeline-item {
            padding-left: 35px;
            border-left: 1px solid var(--accent-color);
            position: relative;
            padding-bottom: 50px;
        }

        .timeline-item::before {
            content: "";
            position: absolute;
            left: -6px;
            top: 6px;
            width: 11px;
            height: 11px;
            border-radius: 50%;
            background-color: var(--accent-color);
            transition: transform 0.3s;
        }
        .timeline-item:hover::before { transform: scale(1.5); }

        .time {
            font-weight: 500;
            color: var(--accent-color);
            font-size: 1.3rem;
            margin-bottom: 5px;
            font-family: var(--font-title);
        }

        .event-title {
            font-size: 1.3rem;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        /* Кружки дресс-кода */
        .palette {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .circle {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 6px 20px rgba(0,0,0,0.08);
            transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            cursor: pointer;
        }
        .circle:hover { transform: scale(1.18); }

        /* Элегантная форма RSVP */
        .rsvp-card {
            background: white;
            padding: 50px 40px;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.03);
            max-width: 500px;
            margin: 40px auto 0 auto;
            text-align: left;
            border: 1px solid #f2eee9;
        }

        .form-group { margin-bottom: 25px; }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 500;
        }

        .input-field {
            width: 100%;
            padding: 16px;
            border: 1px solid #e2ded8;
            border-radius: 8px;
            font-family: var(--font-body);
            font-size: 1rem;
            background-color: #faf9f7;
            outline: none;
            transition: border 0.3s;
        }
        .input-field:focus { border-color: var(--accent-color); background-color: #fff; }

        .radio-opts { display: flex; gap: 25px; padding-top: 5px; }
        .radio-label { font-size: 1rem; color: #444; cursor: pointer; display: flex; align-items: center; gap: 8px; }

        .btn-send {
            width: 100%;
            padding: 18px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
        }
        .btn-send:hover { background-color: #879483; transform: translateY(-2px); }

        footer {
            padding: 100px 20px;
            background-color: #f5f3f0;
            font-family: var(--font-title);
            font-size: 2rem;
            font-style: italic;
            color: #4a4a4a;
            text-align: center;
        }

        @media (max-width: 600px) {
            .hero h1 { font-size: 3.2rem; }
            h2 { font-size: 2.2rem; }
            .timer-container { gap: 10px; }
            .timer-card { min-width: 76px; padding: 12px 5px; }
            .rsvp-card { padding: 35px 20px; }
        }
    </style>
</head>
<body>

    <!-- Главный экран -->
    <div class="hero">
        <div class="hero-bg"></div>
        <div class="hero-content">
            <div class="subtitle">Приглашение на свадьбу</div>
            <h1>Василий и Анастасия</h1>
            <div class="date">29 августа 2026</div>

            <!-- Живой тикающий таймер -->
            <div class="timer-container" id="timer">
                <div class="timer-card">
                    <div class="timer-val" id="d-val">00</div>
                    <div class="timer-lbl" id="d-lbl">Дней</div>
                </div>
                <div class="timer-card">
                    <div class="timer-val" id="h-val">00</div>
                    <div class="timer-lbl" id="h-lbl">Часов</div>
                </div>
